    <!-- Application Structure Plan: The application uses a dashboard/sidebar structure. This is ideal for study notes as it allows users to keep track of topics while focusing on one specific grammatical concept at a time without overwhelming them. The left sidebar serves as the curriculum index. The main content area dynamically updates to show definitions, structural formulas, interactive tables, and a 'Test Yourself' component for active recall. Chart.js is used to visualize linguistic data, providing a unique quantitative perspective on grammar (e.g., word pattern frequency). -->
    <!-- Visualization & Content Choices: 
         1. Topic Overview -> Goal: Inform -> Method: Dynamic Text & Tables -> Interaction: Tab navigation -> Justification: Breaks down dense grammatical rules into digestible chunks.
         2. Word Pattern Frequencies -> Goal: Contextualize -> Method: Chart.js Bar/Pie/Doughnut charts -> Interaction: Hover tooltips -> Justification: Helps students visualize which patterns are most common in real-world texts, prioritizing their study efforts. NO SVG/Mermaid used.
         3. Practice/Flashcards -> Goal: Active Recall -> Method: JS-driven reveal buttons -> Interaction: Click to show answer -> Justification: Enhances retention through active engagement rather than passive reading. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

                            <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 hover:shadow-md transition">
                                <h3 class="font-bold text-lg text-slate-800 text-center border-b pb-2 mb-3">Tefa'ul Babı</h3>
                                <p class="text-xs text-gray-500 mb-3 text-center h-8">Başa te (ت) eklenir, orta harf şeddelenir. <b>Dönüşlülük (Süreç/Zamanla olma).</b></p>
                                <div class="bg-gray-50 p-3 rounded mb-3 text-center">

                                <div class="text-sm">
                                    <div class="flex justify-between border-b pb-1 mb-1">

                                        <span class="arabic-text">عَلِمَ</span>

                                    <div class="flex justify-between font-bold text-[#8b7355]">

                                        <span class="arabic-text">تَعَلَّمَ</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Tefâ'ul Babı -->
                            <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 hover:shadow-md transition">
                                <h3 class="font-bold text-lg text-slate-800 text-center border-b pb-2 mb-3">Tefâ'ul Babı</h3>
                                <p class="text-xs text-gray-500 mb-3 text-center h-8">Başa te, ortaya elif eklenir (Mufa'alenin başına te). <b>İşteşlik, ...gibi görünme.</b></p>
                                <div class="bg-gray-50 p-3 rounded mb-3 text-center">
                                    <span class="arabic-text font-bold text-lg text-teal-700">تَفَاعَلَ - يَتَفَاعَلُ - تَفَاعُل</span>
                                </div>
                                <div class="text-sm">
                                    <div class="flex justify-between border-b pb-1 mb-1">
                                        <span class="text-gray-600">Arafa (Bildi)</span>

                                    <div class="flex justify-between font-bold text-[#8b7355]">

                            <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 hover:shadow-md transition">

                                <p class="text-xs text-gray-500 mb-3 text-center h-8">Başa hemze, son harfe şedde eklenir. <br><b>Renk ve kusur ifade eder.</b></p>
                                <div class="bg-gray-50 p-3 rounded mb-3 text-center">
                                    <span class="arabic-text font-bold text-lg text-teal-700">افْعَلَّ - يَفْعَلُّ - افْعِلَال</span>

                                <div class="text-sm">
                                    <div class="flex justify-between border-b pb-1 mb-1">
                                        <span class="text-gray-600">Hamura (Kırmızıydı)</span>

                                    <div class="flex justify-between font-bold text-[#8b7355]">

                    <!-- 3 Harf İlaveli (Südasi) Bablar -->
                    <div class="mb-4">
                        <h3 class="text-xl font-bold text-[#8b7355] mb-4 border-b border-gray-200 pb-2 flex items-center gap-2"><span>3️⃣</span> 3 Harf İlaveli (Südâsî - 6 Harfli) Bablar</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            
                            <!-- İstif'al Babı -->
                            <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 hover:shadow-md transition">
                                <h3 class="font-bold text-lg text-slate-800 text-center border-b pb-2 mb-3">İstif'âl Babı</h3>

                                <div class="bg-gray-50 p-3 rounded mb-3 text-center">
                                    <span class="arabic-text font-bold text-lg text-rose-700">اسْتَفْعَلَ - يَسْتَفْعِلُ - اسْتِفْعَال</span>

                                        <span class="arabic-text">غَفَرَ</span>
                                    </div>
                                    <div class="flex justify-between font-bold text-[#8b7355]">

        };

        const navMenu = document.getElementById('nav-menu');
        const contentArea = document.getElementById('content-area');
        const sidebar = document.getElementById('sidebar');
        const mobileOverlay = document.getElementById('mobile-overlay');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        let chartInstance = null;

        // Menü Açma/Kapama Fonksiyonları
        function toggleSidebar() {
            if(sidebar) sidebar.classList.toggle('-translate-x-full');
            if(mobileOverlay) mobileOverlay.classList.toggle('hidden');
        }

        if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
        if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', toggleSidebar);
        if(mobileOverlay) mobileOverlay.addEventListener('click', toggleSidebar);

        // Navigation Items Definition
        const navItems = [
            { id: 'home', label: 'Genel Bakış & Analiz', icon: '🔍' },
            { id: 'ismi-fail', label: 'İsm-i Fail (Yapan)', icon: '👤' },
            { id: 'ismi-meful', label: 'İsm-i Meful (Yapılan)', icon: '📦' },
            { id: 'ismi-zaman-mekan', label: 'Zaman & Mekan İsmi', icon: '⏳' },
            { id: 'ismi-tafdil', label: 'İsm-i Tafdil (Üstünlük)', icon: '📈' },
            { id: 'ismi-tasgir', label: 'İsm-i Tasğir (Küçültme)', icon: '🤏' },
            { id: 'ismi-alet', label: 'İsm-i Alet (Araç)', icon: '⚙️' },
            { id: 'mastarlar', label: 'Mastarlar & Türleri', icon: '📖' },
            { id: 'turemis-fiiller', label: 'Türemiş Fiiller (Mezid)', icon: '🔄' },
        ];

        function initApp() {
            renderNav();
            loadTopic('home');
        }

        function renderNav() {
            navItems.forEach(item => {
                const btn = document.createElement('button');
                btn.className = `nav-item w-full text-left px-4 py-3 rounded-lg text-sm font-medium text-gray-600 flex items-center gap-3`;
                btn.onclick = () => loadTopic(item.id);
                btn.id = `nav-${item.id}`;
                btn.innerHTML = `<span>${item.icon}</span> <span>${item.label}</span>`;
                navMenu.appendChild(btn);
            });
        }

        function loadTopic(topicId) {
            // Update Active Nav
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
            });
            const activeBtn = document.getElementById(`nav-${topicId}`);
            if(activeBtn) activeBtn.classList.add('active');

            // Mobilde menüden bir şey seçilince menüyü otomatik kapat (böylece içerik görünür)
            if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            // Destroy previous chart if exists to prevent overlap
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }

            // Get Data
            const data = grammarData[topicId];
            if (!data) return;

            // Scroll to top of content on mobile
            if (window.innerWidth < 768) {
                window.scrollTo({top: 0, behavior: 'smooth'});
            }

            // Render HTML content
            contentArea.innerHTML = `
                <div class="mb-8">
                    <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">${data.title}</h2>
                    ${data.subtitle ? `<h3 class="text-lg text-[#8b7355] mt-1 font-medium">${data.subtitle}</h3>` : ''}
                </div>
                
                <div class="bg-white border-l-4 border-slate-300 p-5 rounded-r-xl shadow-sm mb-8 text-slate-700 leading-relaxed text-lg">
                    ${data.intro}
                </div>

                <div class="topic-content animate-fade-in">
                    ${data.content}
                </div>
            `;

            // Initialize Chart if needed
            if (data.chartSetup) {
                // Short timeout to ensure DOM is ready
                setTimeout(() => {
                    const canvasMatch = data.content.match(/<canvas id="([^"]+)"/);
                    if(canvasMatch && canvasMatch[1]) {
                        const ctx = document.getElementById(canvasMatch[1]);
                        if(ctx) {
                            chartInstance = data.chartSetup(ctx);
                        }
                    }
                }, 50);
            }
        }

        // Global function for flashcards (called from inline onclick)
        window.toggleAnswer = function(btn) {
            const answerSpan = btn.nextElementSibling;
            if (answerSpan && answerSpan.classList.contains('flashcard-answer')) {
                answerSpan.classList.toggle('visible');
                if (answerSpan.classList.contains('visible')) {
                    btn.textContent = 'Cevabı Gizle';
                    btn.classList.replace('bg-[#8b7355]', 'bg-gray-500');
                    btn.classList.replace('hover:bg-[#725e44]', 'hover:bg-gray-600');
                    
                    // Indigo specific styles for Meful
                    btn.classList.replace('bg-indigo-500', 'bg-gray-500');
                    btn.classList.replace('hover:bg-indigo-600', 'hover:bg-gray-600');
                } else {
                    btn.textContent = 'Cevabı Göster';
                    if(btn.closest('.bg-stone-100').innerHTML.includes('indigo')){
                         btn.classList.replace('bg-gray-500', 'bg-indigo-500');
                         btn.classList.replace('hover:bg-gray-600', 'hover:bg-indigo-600');
                    }else{
                        btn.classList.replace('bg-gray-500', 'bg-[#8b7355]');
                        btn.classList.replace('hover:bg-gray-600', 'hover:bg-[#725e44]');
                    }
                }
            }
        };

        // Run
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
